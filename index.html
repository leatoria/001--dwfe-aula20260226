<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site de Notícias</title>
    <script src="./assets/js/login.js"></script>
    <link rel="stylesheet" href="assets/js/login.css">
    <script src="https://kit.fontawesome.com/304c9400f8.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="container">
        <h1>Login</h1>
        <form action="">
            <div class="input-box">
                <input id="email" type="text" placeholder="Informe seu e-mail">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="input-box">
                <input id="senha" type="password" placeholder="Informe sua senha">
                <i class="fa-solid fa-lock"></i>
            </div>
            <button onclick="verificarCredenciais();return false;">
                Entrar
            </button>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox" name="remember"> Lembrar-me
                </label>
                <a href="#">Esqueci minha senha</a>
            </div>

            <div class="register-link">
                <a href="#">Não tem uma conta? Cadastre-se</a>
            </div>
        </form>



    </div>

</body>

</html>
